stages:
  - test

Build:
  stage: test
  image: registry.hpc.ut.ee/mirror/library/rust:1.88-bookworm
  cache:
    key: cargo
    paths:
      - .cargo/registry
  variables:
    CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
  before_script:
    # Cargo.toml's rs-client dependency is the public GitHub mirror, so no
    # auth/URL-rewriting is needed to resolve it here.
    # The rust:bookworm image doesn't ship clippy by default.
    - rustup component add clippy
  script:
    - cargo build --locked
    - cargo clippy --all-targets
